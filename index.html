<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi AI - المنصة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0fdf4; }
        .chat-container { height: calc(100vh - 160px); }
    </style>
</head>
<body class="flex flex-col h-screen">
    <header class="bg-green-700 text-white p-5 shadow-xl text-center border-b-4 border-yellow-500">
        <h1 class="text-2xl font-bold">🇸🇦 Saudi AI 2.01</h1>
        <p class="text-xs opacity-80">المنصة السعودية الذكية للدردشة</p>
    </header>

    <div id="chat-box" class="chat-container overflow-y-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-md max-w-[85%] border-r-4 border-green-600">
            أهلاً بك في Saudi AI! أنا جاهز لمساعدتك، وش في خاطرك اليوم؟
        </div>
    </div>

    <div class="p-4 bg-white border-t-2 border-green-100 flex gap-2">
        <input id="user-input" type="text" 
               class="flex-1 border-2 border-green-200 rounded-full px-5 py-3 focus:outline-none focus:border-green-600" 
               placeholder="اكتب سؤالك هنا...">
        <button onclick="sendMessage()" 
                class="bg-green-600 text-white px-8 py-3 rounded-full hover:bg-green-700 transition-all font-bold">
            إرسال
        </button>
    </div>

    <script>
        // --- ضع مفتاح الـ API الخاص بك هنا ---
        const apiKey = "AIzaSyBVH5hcfq9-JWizC_L5fXueSQ3eNwt9Ge0"; 

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = input.value.trim();
            
            if (!message) return;

            // عرض رسالة المستخدم
            chatBox.innerHTML += `<div class="bg-green-600 text-white p-4 rounded-2xl shadow-md max-w-[85%] mr-auto text-left">${message}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // الاتصال بـ Gemini 1.5 Flash (الأسرع والمجاني)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: message }] }] })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const botReply = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-md max-w-[85%] border-r-4 border-green-600">${botReply}</div>`;
                } else {
                    throw new Error();
                }
            } catch (error) {
                chatBox.innerHTML += `<div class="bg-red-100 text-red-700 p-4 rounded-2xl shadow-md max-w-[85%] border-r-4 border-red-600">عذراً، فيه مشكلة في الاتصال بالمخ (المفتاح). تأكد منه!</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // تشغيل الإرسال عند ضغط زر Enter
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
