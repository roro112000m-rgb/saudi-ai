<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Saudi AI - V 2.05 Enterprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#059669' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; -webkit-tap-highlight-color: transparent; transition: filter 0.2s ease; }
        :root { --anim-speed: 0.3s; --anim-curve: cubic-bezier(0.1, 0.7, 0.1, 1); }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #fcfcfc; }
        .dark body { background-color: #000000; }
        #introScreen {
            position: fixed; inset: 0; z-index: 9999; background: #000000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .message-user { 
            align-self: flex-start; background: #064e3b; color: #ffffff; 
            border-radius: 1.5rem; border-top-left-radius: 0.2rem; 
            padding: 0.8rem 1.2rem; max-width: 80%; margin-bottom: 0.5rem;
            animation: slideLeft var(--anim-speed) var(--anim-curve) forwards;
            font-weight: 600; text-align: right;
        }
        .message-bot { 
            align-self: flex-end; background: #000000; color: #ffffff; 
            border-radius: 1.5rem; border-top-right-radius: 0.2rem; 
            padding: 0.8rem 1.2rem; max-width: 80%; margin-bottom: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: slideRight var(--anim-speed) var(--anim-curve) forwards;
            font-weight: 600; text-align: right; overflow: hidden;
        }
        .dark .message-bot { background: #ffffff; color: #000000; }
        @keyframes slideLeft { 0% { opacity: 0; transform: translateX(-15px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideRight { 0% { opacity: 0; transform: translateX(15px); } 100% { opacity: 1; transform: translateX(0); } }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .modal-base {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 95%; max-width: 450px; background: white; z-index: 1000;
            border-radius: 28px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-height: 85vh; overflow-y: auto; opacity: 0; visibility: hidden; transition: all 0.3s var(--anim-curve);
        }
        .modal-base.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .dark .modal-base { background: #111827; color: white; border: 1px solid #1f2937; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .age-option { border: 2px solid transparent; transition: 0.2s; cursor: pointer; }
        .age-option.selected { border-color: #059669; background: #05966910; }
        .analyzing-text { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100 font-sans antialiased overflow-hidden relative">

    <div id="introScreen">
        <div class="relative z-10 flex flex-col items-center">
            <div class="w-20 h-20 bg-primary rounded-3xl flex items-center justify-center text-white text-4xl font-black shadow-lg">S</div>
            <div class="mt-4 text-white font-black text-xl tracking-widest uppercase italic">Saudi AI</div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>

    <div id="setupModal" class="modal-base">
        <div class="text-center mb-6">
            <h3 class="font-black text-2xl mb-2">إعدادات الرقابة الأبوية 🛡️</h3>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div onclick="selectAge(3)" class="age-option p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 text-center" id="age3">
                <span class="text-2xl block">👶</span><span class="font-black">+3</span>
            </div>
            <div onclick="selectAge(7)" class="age-option p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 text-center" id="age7">
                <span class="text-2xl block">🧒</span><span class="font-black">+7</span>
            </div>
            <div onclick="selectAge(13)" class="age-option p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 text-center" id="age13">
                <span class="text-2xl block">🧑</span><span class="font-black">+13</span>
            </div>
            <div onclick="selectAge(18)" class="age-option p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 text-center" id="age18">
                <span class="text-2xl block">🧔</span><span class="font-black">+18</span>
            </div>
        </div>
        <button onclick="closeSetup()" id="saveBtn" class="w-full bg-primary text-white py-4 rounded-2xl font-black shadow-lg opacity-50 cursor-not-allowed" disabled>حفظ الإعدادات</button>
    </div>

    <nav class="glass bg-white/90 dark:bg-black/90 border-b border-slate-200 dark:border-slate-800 fixed w-full z-[100] top-0 h-14 flex items-center px-6">
        <div class="w-full flex justify-between items-center">
            <div class="flex gap-2">
                <button onclick="clearChat()" class="text-[10px] font-black text-red-500 border border-red-500/20 px-3 py-1 rounded-full">جديد</button>
            </div>
            <span class="font-black text-sm italic">Saudi <span class="text-primary">AI</span></span>
            <button onclick="toggleModal('setupModal')">⚙️</button>
        </div>
    </nav>

    <main class="h-screen pt-16 pb-44 px-4 max-w-4xl mx-auto flex flex-col">
        <div id="chatHistory" class="flex-grow overflow-y-auto flex flex-col p-2 space-y-3"></div>
    </main>

    <div class="fixed bottom-0 left-0 w-full glass bg-white/90 dark:bg-black/90 border-t p-4 pb-12 z-50">
        <div class="max-w-4xl mx-auto flex gap-2 items-center bg-slate-100 dark:bg-slate-900 p-1.5 rounded-full border">
            <textarea id="aiInput" rows="1" class="flex-grow bg-transparent px-4 py-2 font-bold outline-none dark:text-white resize-none text-sm" placeholder="تفضل بطرح سؤالك..."></textarea>
            <button onclick="askAI()" class="bg-primary text-white p-2.5 rounded-full shadow-md">
                <svg class="w-5 h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round
